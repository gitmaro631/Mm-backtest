<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MM 백테스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <h1 style="margin-bottom:0;">MM 백테스트</h1>
          <button class="ip-btn" id="help-btn" onclick="toggleInfo()">❓ 도움말</button>
          <button class="ip-btn" id="utils-btn" onclick="toggleUtils()">🔗 유틸 모음</button>
        </div>
        <div id="lang-switch"></div>
      </div>
      <div id="step-indicator"></div>
    </header>
    <main id="content"></main>
    <footer id="nav-buttons"></footer>
  </div>

  <div id="info-overlay" class="ip-hidden">
    <div id="info-panel"></div>
  </div>
  <div id="utils-overlay" class="ip-hidden">
    <div id="utils-panel"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
